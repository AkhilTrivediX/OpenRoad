services:
  openroad:
    build:
      context: .
    image: openroad:local
    restart: unless-stopped
    ports:
      - "${OPENROAD_PORT:-4173}:4173"
    environment:
      OPENROAD_ADMIN_TOKEN: "${OPENROAD_ADMIN_TOKEN:?Set OPENROAD_ADMIN_TOKEN before starting OpenRoad}"
      OPENROAD_DATA_FILE: /data/openroad-state.json
      OPENROAD_INTEGRATION_FILE: "${OPENROAD_INTEGRATION_FILE:-/data/openroad-integrations.json}"
      OPENROAD_SESSION_FILE: "${OPENROAD_SESSION_FILE:-/data/openroad-sessions.json}"
      OPENROAD_SESSION_TTL_MS: "${OPENROAD_SESSION_TTL_MS:-604800000}"
      OPENROAD_TEAM_FILE: /data/openroad-team.json
      OPENROAD_DIST_DIR: /app/dist
      OPENROAD_OWNER_EMAIL: "${OPENROAD_OWNER_EMAIL:-owner@openroad.local}"
      OPENROAD_OWNER_NAME: "${OPENROAD_OWNER_NAME:-Local owner}"
      OPENROAD_PUBLIC_APP_URL: "${OPENROAD_PUBLIC_APP_URL:-http://127.0.0.1:${OPENROAD_PORT:-4173}/}"
      OPENROAD_INVITATION_DELIVERY_MODE: "${OPENROAD_INVITATION_DELIVERY_MODE:-disabled}"
      OPENROAD_INVITATION_DELIVERY_FILE: "${OPENROAD_INVITATION_DELIVERY_FILE:-/data/openroad-invitation-deliveries.jsonl}"
      OPENROAD_INVITATION_DELIVERY_HTTP_URL: "${OPENROAD_INVITATION_DELIVERY_HTTP_URL:-}"
      OPENROAD_INVITATION_DELIVERY_HTTP_BEARER_TOKEN: "${OPENROAD_INVITATION_DELIVERY_HTTP_BEARER_TOKEN:-}"
      OPENROAD_INVITATION_DELIVERY_HTTP_TIMEOUT_MS: "${OPENROAD_INVITATION_DELIVERY_HTTP_TIMEOUT_MS:-10000}"
      OPENROAD_ACCOUNT_RECOVERY_DELIVERY_MODE: "${OPENROAD_ACCOUNT_RECOVERY_DELIVERY_MODE:-disabled}"
      OPENROAD_ACCOUNT_RECOVERY_DELIVERY_FILE: "${OPENROAD_ACCOUNT_RECOVERY_DELIVERY_FILE:-/data/openroad-account-recovery-deliveries.jsonl}"
      OPENROAD_ACCOUNT_RECOVERY_PUBLIC_BASE_URL: "${OPENROAD_ACCOUNT_RECOVERY_PUBLIC_BASE_URL:-}"
      OPENROAD_NOTIFICATION_DELIVERY_MODE: "${OPENROAD_NOTIFICATION_DELIVERY_MODE:-disabled}"
      OPENROAD_NOTIFICATION_DELIVERY_FILE: "${OPENROAD_NOTIFICATION_DELIVERY_FILE:-/data/openroad-notification-deliveries.jsonl}"
      OPENROAD_TOKEN_ENCRYPTION_KEY: "${OPENROAD_TOKEN_ENCRYPTION_KEY:-}"
      OPENROAD_TOKEN_ENCRYPTION_KEY_ID: "${OPENROAD_TOKEN_ENCRYPTION_KEY_ID:-primary}"
      OPENROAD_SINGLE_USER_MODE: "false"
      OPENROAD_TRUST_PROXY_HEADERS: "${OPENROAD_TRUST_PROXY_HEADERS:-false}"
      OPENROAD_GITHUB_APP_SLUG: "${OPENROAD_GITHUB_APP_SLUG:-}"
      OPENROAD_GITHUB_APP_ID: "${OPENROAD_GITHUB_APP_ID:-}"
      OPENROAD_GITHUB_APP_CLIENT_ID: "${OPENROAD_GITHUB_APP_CLIENT_ID:-}"
      OPENROAD_GITHUB_APP_PRIVATE_KEY_FILE: "${OPENROAD_GITHUB_APP_PRIVATE_KEY_FILE:-}"
      OPENROAD_GITHUB_APP_WEBHOOK_SECRET: "${OPENROAD_GITHUB_APP_WEBHOOK_SECRET:-}"
      OPENROAD_LINEAR_CLIENT_ID: "${OPENROAD_LINEAR_CLIENT_ID:-}"
      OPENROAD_LINEAR_CLIENT_SECRET: "${OPENROAD_LINEAR_CLIENT_SECRET:-}"
      OPENROAD_LINEAR_REDIRECT_URI: "${OPENROAD_LINEAR_REDIRECT_URI:-}"
      OPENROAD_LINEAR_WEBHOOK_SECRET: "${OPENROAD_LINEAR_WEBHOOK_SECRET:-}"
      OPENROAD_JIRA_AUTH_BASE_URL: "${OPENROAD_JIRA_AUTH_BASE_URL:-https://auth.atlassian.com}"
      OPENROAD_JIRA_CLIENT_ID: "${OPENROAD_JIRA_CLIENT_ID:-}"
      OPENROAD_JIRA_CLIENT_SECRET: "${OPENROAD_JIRA_CLIENT_SECRET:-}"
      OPENROAD_JIRA_REDIRECT_URI: "${OPENROAD_JIRA_REDIRECT_URI:-}"
      OPENROAD_JIRA_API_BASE_URL: "${OPENROAD_JIRA_API_BASE_URL:-https://api.atlassian.com/ex/jira}"
      OPENROAD_JIRA_WEBHOOK_SECRET: "${OPENROAD_JIRA_WEBHOOK_SECRET:-}"
      PORT: "4173"
    volumes:
      - openroad-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4173/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  openroad-data:
